project:
  name: bsm-sim
  timezone: America/New_York

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  interim_dir: data/interim
  reports_dir: reports

dataset:
  name: yellow
  year: 2025
  month: 11
  url: ""
  filename: ""
  pickup_col: tpep_pickup_datetime
  dropoff_col: tpep_dropoff_datetime
  pu_col: PULocationID
  do_col: DOLocationID
  passenger_col: passenger_count
  distance_col: trip_distance
  fare_col: fare_amount
  total_col: total_amount

processing:
  min_duration_min: 1
  max_duration_min: 240
  min_speed_mph: 1
  max_speed_mph: 80

simulation:
  step_minutes: 5
  max_wait_minutes: 15
  pickup_eta_minutes: 5
  n_vehicles: 20000
  policy: greedy_same_zone_then_any
  random_seed: 7
  sample_fraction: 1.0

metrics:
  outputs:
    - avg_wait_min
    - p95_wait_min
    - unserved_rate
    - utilization
    - avg_trip_min
    - throughput_per_hour
